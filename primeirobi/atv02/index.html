<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro de Usuário</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
<form>

<fieldset>
<legend>Crie sua Conta</legend>

<label for="nome">Nome</label>
<input type="text" id="nome" name="nome" placeholder="Digite seu nome">

<label for="email">E-mail</label>
<input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>

<label for="senha">Senha</label>
<input type="password" id="senha" name="senha" minlength="8" placeholder="Mínimo 8 caracteres" required>

<strong>Gênero</strong>

<div class="radio-group">
<input type="radio" id="masculino" name="genero" value="masculino">
<label for="masculino">Masculino</label>

<input type="radio" id="feminino" name="genero" value="feminino">
<label for="feminino">Feminino</label>
</div>

<label for="bio">Biografia</label>
<textarea id="bio" name="biografia" rows="4" placeholder="Conte um pouco sobre você..."></textarea>

<div class="checkbox">
<input type="checkbox" id="termos" name="termos" required>
<label for="termos">Eu concordo com os termos de uso</label>
</div>

<button type="submit">Criar Conta</button>

</fieldset>

</form>
</div>

</body>
</html>
